<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">💰</div>
        <h1>Controle Financeiro</h1>
        <p>Gerencie suas finanças com inteligência</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="error-message" class="error-message hidden"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span id="login-text">Entrar</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
